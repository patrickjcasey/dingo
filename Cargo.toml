[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Patrick Casey <patrick.casey1@outlook.com>"]
license = "MIT"
repository = "https://github.com/patrickjcasey/dingo"

[workspace.dependencies]
# Internal crates
dingo-proto = { path = "crates/dingo-proto" }

# External dependencies
hex = "0.4"
pcap-parser = "0.15"
