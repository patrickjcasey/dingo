name: Release

on:
  push:
    tags:
      - "dingo-proto-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches crate version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          tag_version="${TAG#dingo-proto-v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "dingo-proto") | .version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo.toml version ($crate_version)" >&2
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p dingo-proto
