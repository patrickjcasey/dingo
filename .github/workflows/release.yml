name: Release

on:
  push:
    tags:
      - "dingo-proto-v*"

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches crate version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          tag_version="${TAG#dingo-proto-v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "dingo-proto") | .version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "Tag version ($tag_version) does not match Cargo.toml version ($crate_version)" >&2
            exit 1
          fi

  verify-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} points to a commit that is not on main" >&2
            exit 1
          fi

  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: [verify-tag, verify-branch, ci]
    steps:
      - uses: actions/checkout@v6

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p dingo-proto
